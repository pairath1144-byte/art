<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>ระบบนิเทศออนไลน์ โรงเรียนบ้านสากอ</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="assets/logo.jpeg" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--navy:#052d72;--blue:#1174ee;--gold:#f3bd28;--ink:#08275b;--muted:#6b7895;--bg:#eef4ff;--card:#fff;--ok:#0aa477;--danger:#e53e3e;--shadow:0 18px 45px rgba(8,39,91,.14);--radius:22px}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,sans-serif;color:var(--ink);background:linear-gradient(180deg,#eaf2ff,#f8fbff);min-height:100vh}.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,#06387f,#021e56);color:#fff;padding:22px 16px;position:sticky;top:0;height:100vh;box-shadow:8px 0 30px rgba(0,20,80,.22);overflow:auto}.brand{text-align:center;margin-bottom:20px}.brand img{width:145px;height:145px;object-fit:contain;border-radius:18px}.brand h2{margin:4px 0 0;font-size:20px}.nav button{width:100%;display:flex;align-items:center;gap:12px;border:0;margin:7px 0;padding:14px 16px;border-radius:15px;color:#fff;background:transparent;font-weight:800;font-size:16px;cursor:pointer;text-align:left}.nav button:hover,.nav button.active{background:linear-gradient(135deg,#1688ff,#0b55d9);box-shadow:0 10px 22px rgba(0,0,0,.18)}.quote{margin-top:38px;text-align:center;color:#dceaff;line-height:1.7}.main{padding:22px;overflow:hidden}.hero{min-height:210px;border-radius:0 0 0 34px;background:linear-gradient(90deg,rgba(4,42,105,.97),rgba(16,112,223,.78)),url('assets/reference.jpeg') center/cover;color:#fff;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:end;padding:26px 32px;box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-80px;top:-90px;width:340px;height:340px;border-radius:50%;border:18px solid rgba(243,189,40,.6)}.hero h1{font-size:48px;line-height:1.05;margin:4px 0}.hero p{font-size:24px;margin:0}.people{display:flex;align-items:end;gap:0;z-index:1}.people img{height:190px;width:132px;object-fit:cover;border-radius:22px;margin-left:-10px;border:4px solid rgba(255,255,255,.7);box-shadow:0 16px 28px rgba(0,0,0,.25)}.topbox{z-index:1;background:rgba(255,255,255,.95);color:var(--ink);border-radius:18px;padding:12px 16px;min-width:220px;box-shadow:var(--shadow)}.page{display:none}.page.active{display:block}.grid{display:grid;gap:16px}.stats{grid-template-columns:repeat(4,minmax(0,1fr));margin-top:18px}.card{background:rgba(255,255,255,.96);border:1px solid rgba(5,45,114,.08);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}.stat{display:flex;align-items:center;gap:16px}.ico{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;font-size:30px;color:#fff;background:linear-gradient(135deg,#157cff,#0c4cc4)}.stat:nth-child(2) .ico{background:linear-gradient(135deg,#1bc79b,#058568)}.stat:nth-child(3) .ico{background:linear-gradient(135deg,#ffc22e,#f19800)}.stat:nth-child(4) .ico{background:linear-gradient(135deg,#b35cff,#7029c9)}.stat h3{margin:0;font-size:15px}.stat b{font-size:34px}.stat small{color:var(--ok);font-weight:700}.dash{grid-template-columns:1.25fr 1fr 330px;margin-top:16px}.two{grid-template-columns:1fr 1fr}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.form .full{grid-column:1/-1}label{font-weight:800}input,select,textarea{width:100%;border:1px solid #d7e0f2;background:#fff;border-radius:14px;padding:13px 14px;font:inherit;color:var(--ink);outline:none}textarea{min-height:105px}.btn{border:0;border-radius:14px;background:linear-gradient(135deg,#167cff,#0647c8);color:#fff;font-weight:900;padding:13px 18px;cursor:pointer;box-shadow:0 12px 25px rgba(14,91,216,.25)}.btn.secondary{background:#edf4ff;color:var(--ink);box-shadow:none}.btn.danger{background:linear-gradient(135deg,#ff6262,#d01f1f)}table{width:100%;border-collapse:collapse;overflow:hidden}th,td{text-align:left;padding:12px;border-bottom:1px solid #edf1f8}th{color:#28518d;background:#f5f8ff}.pill{padding:6px 10px;border-radius:999px;background:#e9f7f1;color:#08735a;font-weight:800}.profile{text-align:center}.profile img{width:155px;height:155px;border-radius:50%;object-fit:cover;border:5px solid var(--gold)}.notice{list-style:none;padding:0;margin:0}.notice li{padding:12px 0;border-bottom:1px solid #edf1f8}.bars .row{display:grid;grid-template-columns:170px 1fr 44px;align-items:center;gap:10px;margin:15px 0}.bar{height:13px;border-radius:99px;background:#edf2fb;overflow:hidden}.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#1688ff,#0d52cd)}.mobilebar{display:none;position:sticky;bottom:0;z-index:5;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -12px 30px rgba(0,20,80,.15);padding:8px;grid-template-columns:repeat(5,1fr)}.mobilebar button{border:0;background:transparent;padding:8px;color:var(--ink);font-size:12px;font-weight:800}.toast{position:fixed;right:18px;bottom:18px;background:#073074;color:#fff;padding:14px 18px;border-radius:14px;box-shadow:var(--shadow);display:none;z-index:10}.login{position:fixed;inset:0;background:linear-gradient(135deg,#041d50,#1077e5);display:grid;place-items:center;z-index:20}.loginbox{width:min(430px,92vw);background:#fff;border-radius:28px;padding:28px;box-shadow:var(--shadow);text-align:center}.loginbox img{width:130px;height:130px;object-fit:contain}.searchrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}.searchrow input{max-width:320px}.footer{text-align:center;color:#fff;background:#052d72;margin-top:18px;border-radius:16px;padding:12px}@media(max-width:1100px){.app{grid-template-columns:1fr}.side{display:none}.main{padding:12px}.hero{grid-template-columns:1fr;min-height:auto;padding:22px}.hero h1{font-size:34px}.stats,.dash,.two{grid-template-columns:1fr}.people img{height:130px;width:100px}.mobilebar{display:grid}.form{grid-template-columns:1fr}.topbox{min-width:0}.bars .row{grid-template-columns:120px 1fr 40px}}@media print{.side,.mobilebar,.btn,.hero{display:none}.main{margin:0}.page{display:block}.card{box-shadow:none}}
</style>
</head>
<body>
<div id="login" class="login"><div class="loginbox"><img src="assets/logo.jpeg"><h1>ระบบนิเทศออนไลน์</h1><p>โรงเรียนบ้านสากอ</p><input id="loginName" placeholder="ชื่อผู้ใช้งาน" value="ผู้บริหารโรงเรียน"><input id="loginPass" type="password" placeholder="รหัสผ่าน" value="1234"><button class="btn" onclick="login()" style="width:100%;margin-top:12px">เข้าสู่ระบบ</button><small>รหัสเริ่มต้น 1234 เปลี่ยนได้ในตั้งค่า</small></div></div>
<div class="app">
<aside class="side"><div class="brand"><img src="assets/logo.jpeg"><h2>โรงเรียนบ้านสากอ</h2></div><nav class="nav" id="nav"></nav><div class="quote">“นิเทศด้วยใจ<br>พัฒนาไปด้วยกัน”</div></aside>
<main class="main">
<section class="hero"><div><div style="font-size:25px;font-weight:800">ยินดีต้อนรับเข้าสู่ระบบ</div><h1>ระบบนิเทศออนไลน์</h1><p>โรงเรียนบ้านสากอ</p></div><div class="people"><img src="assets/director_blue.jpeg"><img src="assets/supervisor_black.jpeg"><div class="topbox"><b id="userLabel">ผู้บริหารโรงเรียน</b><br><small>วันที่ <span id="dateNow"></span></small><br><small>เวลา <span id="timeNow"></span></small></div></div></section>
<section id="dashboard" class="page active"></section>
<section id="record" class="page"></section>
<section id="evaluate" class="page"></section>
<section id="plan" class="page"></section>
<section id="reports" class="page"></section>
<section id="history" class="page"></section>
<section id="users" class="page"></section>
<section id="settings" class="page"></section>
<div class="footer">ระบบนิเทศออนไลน์ โรงเรียนบ้านสากอ | พัฒนาคุณภาพการศึกษา ก้าวหน้าด้วยการนิเทศ</div>
</main>
</div><div class="mobilebar" id="mnav"></div><div id="toast" class="toast"></div>
<script>
const SHEET_API_URL = localStorage.getItem('sheetApi') || 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL';
const STORE='sako_supervision_v3';
let records=JSON.parse(localStorage.getItem(STORE)||'[]');
let plans=JSON.parse(localStorage.getItem('plans')||'[]');
let users=JSON.parse(localStorage.getItem('users')||'[]');
const menus=[['dashboard','🏠','หน้าหลัก'],['record','✏️','บันทึกการนิเทศ'],['evaluate','⭐','ประเมินการนิเทศ'],['plan','📅','กำหนดแผน'],['reports','📄','รายงานผล'],['history','🕘','ประวัติ'],['users','👥','จัดการผู้ใช้งาน'],['settings','⚙️','ตั้งค่าระบบ']];
function seed(){if(!records.length){records=[{id:1,date:'2568-05-17',supervisor:'นายอวิชญน์ พรหมมา',teacher:'น.ส.ฤทุมาศ แก้วคำ',subject:'วิทยาศาสตร์',level:'ม.2',score:4.5,manage:4.5,learner:4.2,innovation:4.3,measure:4.4,classroom:4.1,comment:'จัดกิจกรรมชัดเจน ผู้เรียนมีส่วนร่วมดี'},{id:2,date:'2568-05-16',supervisor:'นายอวิชญน์ พรหมมา',teacher:'นายธนกร ศรีสมบัติ',subject:'คณิตศาสตร์',level:'ป.6',score:4.4,manage:4.4,learner:4.2,innovation:4.2,measure:4.3,classroom:4.4,comment:'ควรเพิ่มสื่อจับต้องได้'}, {id:3,date:'2568-05-15',supervisor:'นายอวิชญน์ พรหมมา',teacher:'น.ส.นภาพร ใจดี',subject:'ภาษาไทย',level:'ม.3',score:4.2,manage:4.3,learner:4.1,innovation:4.2,measure:4.2,classroom:4.1,comment:'บรรยากาศการเรียนรู้ดี'}];save();}if(!users.length){users=[{name:'นายอวิชญน์ พรหมมา',role:'ผู้อำนวยการโรงเรียน'},{name:'ครูวิชาการ',role:'ผู้ใช้งาน'}];localStorage.setItem('users',JSON.stringify(users));}}
function save(){localStorage.setItem(STORE,JSON.stringify(records));}
function toast(t){let x=document.getElementById('toast');x.textContent=t;x.style.display='block';setTimeout(()=>x.style.display='none',2200)}
function navBuild(){nav.innerHTML=menus.map(m=>`<button onclick="show('${m[0]}')" id="n-${m[0]}">${m[1]} ${m[2]}</button>`).join('')+`<button onclick="logout()">🚪 ออกจากระบบ</button>`;mnav.innerHTML=menus.slice(0,5).map(m=>`<button onclick="show('${m[0]}')"><div>${m[1]}</div>${m[2].replace('การนิเทศ','')}</button>`).join('')}
function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));let n=document.getElementById('n-'+id);if(n)n.classList.add('active');render();window.scrollTo(0,0)}
function avg(a){return a.length?(a.reduce((s,x)=>s+Number(x.score||0),0)/a.length).toFixed(2):'0.00'}
function uniq(a,k){return new Set(a.map(x=>x[k])).size}
function groupSubject(){let g={};records.forEach(r=>{g[r.subject]=g[r.subject]||[];g[r.subject].push(+r.score)});return Object.entries(g).map(([k,v])=>[k,(v.reduce((a,b)=>a+b,0)/v.length).toFixed(2)]).sort((a,b)=>b[1]-a[1])}
function render(){renderDash();renderRecord();renderEval();renderPlan();renderReports();renderHistory();renderUsers();renderSettings();}
let charts=[];function clearCharts(){charts.forEach(c=>c.destroy());charts=[]}
function renderDash(){let top=groupSubject()[0]||['-',0];dashboard.innerHTML=`<div class="grid stats"><div class="card stat"><div class="ico">👥</div><div><h3>จำนวนครั้งที่นิเทศ</h3><b>${records.length}</b> ครั้ง<br><small>ข้อมูลปัจจุบัน</small></div></div><div class="card stat"><div class="ico">👤</div><div><h3>ครูที่ได้รับการนิเทศ</h3><b>${uniq(records,'teacher')}</b> คน<br><small>ไม่ซ้ำรายชื่อ</small></div></div><div class="card stat"><div class="ico">⭐</div><div><h3>คะแนนเฉลี่ยรวม</h3><b>${avg(records)}</b> คะแนน<br><small>จากทุกแบบประเมิน</small></div></div><div class="card stat"><div class="ico">📖</div><div><h3>วิชาที่นิเทศมากที่สุด</h3><b style="font-size:22px">${top[0]}</b><br><small>${top[1]} คะแนน</small></div></div></div><div class="grid dash"><div class="card"><h2>แนวโน้มคะแนนเฉลี่ย</h2><canvas id="lineChart"></canvas></div><div class="card"><h2>คะแนนเฉลี่ยรายด้าน</h2><div class="bars">${['manage:ด้านการจัดการเรียนรู้','learner:ด้านผู้เรียน','innovation:ด้านนวัตกรรม','measure:ด้านการวัดและประเมินผล','classroom:ด้านบริหารจัดการชั้นเรียน'].map(x=>{let [k,t]=x.split(':');let v=(records.reduce((s,r)=>s+(+r[k]||0),0)/(records.length||1)).toFixed(2);return `<div class="row"><b>${t}</b><div class="bar"><i style="width:${v/5*100}%"></i></div><span>${v}</span></div>`}).join('')}</div></div><div class="card profile"><img src="assets/director_blue.jpeg"><h2>นายอวิชญน์ พรหมมา</h2><p>ผู้อำนวยการโรงเรียนบ้านสากอ</p><hr><h3>ประกาศ / แจ้งเตือน</h3><ul class="notice"><li>กำหนดการนิเทศ ภาคเรียนที่ 1/2568</li><li>รายงานผลประจำเดือน</li><li>ประชุม PLC คุณครู</li></ul></div></div><div class="grid two"><div class="card"><h2>สัดส่วนผลการประเมิน</h2><canvas id="pieChart"></canvas></div><div class="card"><h2>คะแนนเฉลี่ยรายวิชา Top 5</h2><canvas id="barChart"></canvas></div></div>`;setTimeout(drawCharts,0)}
function drawCharts(){clearCharts();let labels=records.map(r=>r.date);charts.push(new Chart(lineChart,{type:'line',data:{labels,datasets:[{label:'คะแนนเฉลี่ย',data:records.map(r=>r.score),tension:.35}]},options:{responsive:true}}));let excellent=records.filter(r=>r.score>=4.5).length,good=records.filter(r=>r.score>=4&&r.score<4.5).length,mid=records.filter(r=>r.score>=3&&r.score<4).length,low=records.length-excellent-good-mid;charts.push(new Chart(pieChart,{type:'doughnut',data:{labels:['ดีเยี่ยม','ดีมาก','ดี','ควรปรับปรุง'],datasets:[{data:[excellent,good,mid,low]}]}}));let s=groupSubject().slice(0,5);charts.push(new Chart(barChart,{type:'bar',data:{labels:s.map(x=>x[0]),datasets:[{label:'คะแนน',data:s.map(x=>x[1])}]},options:{scales:{y:{min:0,max:5}}}}));}
function renderRecord(){record.innerHTML=`<div class="card"><h2>บันทึกการนิเทศ</h2><div class="form"><div><label>ชื่อผู้นิเทศ</label><input id="fSupervisor" value="นายอวิชญน์ พรหมมา"></div><div><label>วันที่นิเทศ</label><input type="date" id="fDate"></div><div><label>ชื่อครูผู้รับการนิเทศ</label><input id="fTeacher" placeholder="กรอกชื่อครู"></div><div><label>วิชา</label><input id="fSubject" placeholder="เช่น คณิตศาสตร์"></div><div><label>ชั้น</label><input id="fLevel" placeholder="เช่น ป.6 / ม.2"></div><div><label>คะแนนรวม</label><input type="number" step="0.01" min="1" max="5" id="fScore" value="4.50"></div><div class="full"><label>ความคิดเห็นและข้อเสนอแนะ</label><textarea id="fComment"></textarea></div><div class="full"><button class="btn" onclick="addRecord()">บันทึกข้อมูล</button> <button class="btn secondary" onclick="clearForm()">ล้างฟอร์ม</button></div></div></div>`}
function addRecord(){let r={id:Date.now(),date:fDate.value||new Date().toISOString().slice(0,10),supervisor:fSupervisor.value,teacher:fTeacher.value,subject:fSubject.value,level:fLevel.value,score:+fScore.value||0,manage:+fScore.value||0,learner:+fScore.value||0,innovation:+fScore.value||0,measure:+fScore.value||0,classroom:+fScore.value||0,comment:fComment.value};if(!r.teacher||!r.subject){toast('กรุณากรอกชื่อครูและวิชา');return}records.unshift(r);save();syncPost(r);toast('บันทึกข้อมูลสำเร็จ');show('dashboard')}
function clearForm(){document.querySelectorAll('#record input,#record textarea').forEach(i=>{if(i.type!='date')i.value=''})}
function renderEval(){evaluate.innerHTML=`<div class="card"><h2>ประเมินการนิเทศรายด้าน</h2><div class="form"><div><label>ชื่อครู</label><input id="eTeacher"></div><div><label>วิชา</label><input id="eSubject"></div>${['manage:ด้านการจัดการเรียนรู้','learner:ด้านผู้เรียน','innovation:ด้านนวัตกรรม','measure:ด้านการวัดและประเมินผล','classroom:ด้านบริหารจัดการชั้นเรียน'].map(x=>{let [id,t]=x.split(':');return `<div><label>${t}</label><input id="${id}" type="number" min="1" max="5" step="0.01" value="4.50"></div>`}).join('')}<div class="full"><label>ข้อเสนอแนะ</label><textarea id="eComment"></textarea></div><div class="full"><button class="btn" onclick="saveEval()">บันทึกแบบประเมิน</button></div></div></div>`}
function saveEval(){let vals=['manage','learner','innovation','measure','classroom'].map(id=>+document.getElementById(id).value||0);let score=+(vals.reduce((a,b)=>a+b,0)/5).toFixed(2);records.unshift({id:Date.now(),date:new Date().toISOString().slice(0,10),supervisor:'นายอวิชญน์ พรหมมา',teacher:eTeacher.value,subject:eSubject.value,level:'',score,manage:vals[0],learner:vals[1],innovation:vals[2],measure:vals[3],classroom:vals[4],comment:eComment.value});save();toast('บันทึกแบบประเมินสำเร็จ');show('dashboard')}
function renderPlan(){plan.innerHTML=`<div class="card"><h2>กำหนดแผนการนิเทศ</h2><div class="form"><div><label>วันที่</label><input type="date" id="pDate"></div><div><label>เวลา</label><input type="time" id="pTime"></div><div><label>ครู/กลุ่มสาระ</label><input id="pTeacher"></div><div><label>หัวข้อการนิเทศ</label><input id="pTopic"></div><div class="full"><button class="btn" onclick="addPlan()">เพิ่มแผน</button></div></div></div><div class="card"><h2>ตารางแผนการนิเทศ</h2><table><thead><tr><th>วันเวลา</th><th>ครู</th><th>หัวข้อ</th><th></th></tr></thead><tbody>${plans.map((p,i)=>`<tr><td>${p.date} ${p.time}</td><td>${p.teacher}</td><td>${p.topic}</td><td><button class="btn danger" onclick="delPlan(${i})">ลบ</button></td></tr>`).join('')}</tbody></table></div>`}
function addPlan(){plans.push({date:pDate.value,time:pTime.value,teacher:pTeacher.value,topic:pTopic.value});localStorage.setItem('plans',JSON.stringify(plans));toast('เพิ่มแผนแล้ว');renderPlan()}function delPlan(i){plans.splice(i,1);localStorage.setItem('plans',JSON.stringify(plans));renderPlan()}
function renderReports(){reports.innerHTML=`<div class="card"><h2>รายงานผลการนิเทศ</h2><p>จำนวนรายการ ${records.length} | คะแนนเฉลี่ย ${avg(records)}</p><button class="btn" onclick="window.print()">พิมพ์/บันทึก PDF</button> <button class="btn secondary" onclick="exportCSV()">ส่งออก CSV</button></div><div class="card"><table><thead><tr><th>วันที่</th><th>ครู</th><th>วิชา</th><th>ชั้น</th><th>คะแนน</th><th>ข้อเสนอแนะ</th></tr></thead><tbody>${records.map(r=>`<tr><td>${r.date}</td><td>${r.teacher}</td><td>${r.subject}</td><td>${r.level||''}</td><td><span class="pill">${r.score}</span></td><td>${r.comment||''}</td></tr>`).join('')}</tbody></table></div>`}
function renderHistory(){history.innerHTML=`<div class="card"><h2>ประวัติการนิเทศ</h2><div class="searchrow"><input id="q" placeholder="ค้นหาชื่อครู/วิชา" oninput="filterHistory()"><button class="btn danger" onclick="clearAll()">ล้างข้อมูลทั้งหมด</button></div><table><thead><tr><th>วันที่</th><th>ผู้นิเทศ</th><th>ครู</th><th>วิชา</th><th>คะแนน</th><th>จัดการ</th></tr></thead><tbody id="histBody">${rowHistory(records)}</tbody></table></div>`}
function rowHistory(arr){return arr.map(r=>`<tr><td>${r.date}</td><td>${r.supervisor}</td><td>${r.teacher}</td><td>${r.subject}</td><td>${r.score}</td><td><button class="btn danger" onclick="delRecord(${r.id})">ลบ</button></td></tr>`).join('')}function filterHistory(){let v=q.value.toLowerCase();histBody.innerHTML=rowHistory(records.filter(r=>(r.teacher+r.subject).toLowerCase().includes(v)))}function delRecord(id){records=records.filter(r=>r.id!==id);save();renderHistory();toast('ลบข้อมูลแล้ว')}function clearAll(){if(confirm('ยืนยันล้างข้อมูลทั้งหมด?')){records=[];save();render();}}
function renderUsers(){users.innerHTML=`<div class="card"><h2>จัดการผู้ใช้งาน</h2><div class="form"><div><label>ชื่อ</label><input id="uName"></div><div><label>บทบาท</label><input id="uRole"></div><div class="full"><button class="btn" onclick="addUser()">เพิ่มผู้ใช้</button></div></div></div><div class="card"><table><thead><tr><th>ชื่อ</th><th>บทบาท</th></tr></thead><tbody>${users.map(u=>`<tr><td>${u.name}</td><td>${u.role}</td></tr>`).join('')}</tbody></table></div>`}function addUser(){users.push({name:uName.value,role:uRole.value});localStorage.setItem('users',JSON.stringify(users));renderUsers();toast('เพิ่มผู้ใช้งานแล้ว')}
function renderSettings(){settings.innerHTML=`<div class="card"><h2>ตั้งค่าระบบ</h2><label>Google Apps Script Web App URL</label><input id="api" value="${SHEET_API_URL}"><br><br><button class="btn" onclick="localStorage.setItem('sheetApi',api.value);toast('บันทึก URL แล้ว')">บันทึกการเชื่อมต่อ</button><hr><p>ใช้แบบ Offline ได้ผ่าน LocalStorage และเมื่อใส่ URL จะส่งข้อมูลไป Google Sheets ได้</p></div>`}
function exportCSV(){let csv='date,supervisor,teacher,subject,level,score,comment\n'+records.map(r=>[r.date,r.supervisor,r.teacher,r.subject,r.level,r.score,r.comment].map(x=>'"'+String(x||'').replaceAll('"','""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='supervision-report.csv';a.click()}
async function syncPost(r){if(!SHEET_API_URL.includes('script.google.com'))return;try{await fetch(SHEET_API_URL,{method:'POST',body:JSON.stringify(r)});}catch(e){console.log(e)}}
async function syncGet(){if(!SHEET_API_URL.includes('script.google.com'))return;try{let res=await fetch(SHEET_API_URL);let data=await res.json();if(Array.isArray(data)&&data.length){records=data;save();render();toast('ซิงก์ข้อมูลจาก Google Sheets แล้ว')}}catch(e){console.log(e)}}
function login(){localStorage.setItem('loginName',loginName.value||'ผู้บริหารโรงเรียน');userLabel.textContent=localStorage.getItem('loginName');document.getElementById('login').style.display='none'}function logout(){document.getElementById('login').style.display='grid'}
function clock(){let d=new Date();dateNow.textContent=d.toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});timeNow.textContent=d.toLocaleTimeString('th-TH')}setInterval(clock,1000);
seed();navBuild();clock();render();show('dashboard');if(localStorage.getItem('loginName')){userLabel.textContent=localStorage.getItem('loginName');login.style.display='none'}if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
</script>
</body></html>
